<section class="section">

<h2>Reserve a Table</h2>

<form class="reservation-form" action="https://formspree.io/f/FORM_ID" method="POST" style="margin-top:30px; display:flex; flex-direction:column; gap:15px; max-width:500px;">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="tel" name="phone" placeholder="Phone Number" required>

<input type="date" name="date" required>
<input type="time" name="time" required>

<input type="number" name="guests" placeholder="Number of Guests" required>

<textarea name="message" placeholder="Special Requests"></textarea>

<button class="btn primary" type="submit">Confirm Reservation</button>

</form>

<div class="form-success" style="display:none; margin-top:30px;">
<h3>Reservation Confirmed</h3>
<p>Your booking has been received. We look forward to hosting you.</p>
</div>

</section>

<footer class="footer">
<p>Praia, Cape Verde | +238918610</p>
</footer>
